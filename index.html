<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parallax Website</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js" defer></script>
  </head>
  <body>
    <article class="moon-parallax">
        <img src="assets/bg.jpg" alt="background-image" id="bg">
        <img src="assets/moon.png" alt="moon-image" id="moon">
        <img src="assets/mountain.png" alt="mountain-image" id="mountain">
        <img src="assets/road.png" alt="road-image" id="road">
        <h2 id="text">Moon Light</h2>
    </article>

    <article class="accordion" id="faq-container">
        <h1>Frequently Asked Questions</h1>
    </article>

    <article class="testimonials" id=""></article>
  </body>
</html>
